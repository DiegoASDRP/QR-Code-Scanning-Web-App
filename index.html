<!DOCTYPE html>
<html>
<head>
  <title>QR Code Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body.scanned {
      background-color: green !important;
      transition: none;
    }

    body.detected {
      background-color: yellow !important;
      transition: none;
    }

    body.error {
      background-color: red !important;
      transition: none;
    }

    .error-message {
      font-size: 24px;
      font-weight: bold;
      color: white;
      text-align: center;
      margin: 20px 0;
      padding: 15px;
      background-color: rgba(0, 0, 0, 0.7);
      border-radius: 10px;
    }

    .processing {
      font-size: 18px;
      color: #666;
      text-align: center;
      margin: 10px 0;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h2>Scan QR Code</h2>
  <div id="reader" width="300px"></div>
  <p id="result"></p>
  <p id="processing-status" class="processing" style="display: none;">Processing scan...</p>

  <script>
    // ── CONFIG ─────────────────────────────────────────────────────────────────
    // GAS web app URL (redeploy after updating Code.gs).
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzAg9_hWbbakZUzTJxXQmYXNN5XsI9zLYIB1LvlSQzlQ4miAXVH55UiRedFLGAICjTd/exec";
    // A shared secret — must match API_KEY in Code.gs.
    // Not invisible to determined users, but blocks casual/automated abuse.
    const API_KEY = "CENSORED_KEY"; // e.g. a random 32-char string
    // ──────────────────────────────────────────────────────────────────────────

    const QR_PREFIX = "26SPExpoGuest-";
    const MAX_QR_LENGTH = 25;
    const QUEUE_STORAGE_KEY = "qr_scan_queue_v1";
    const HIDE_SYNC_VISUALS = false; // Sync/retry still runs; only UI is hidden.
    const DETECT_FLASH_MS = 90;
    const CAPTURE_FLASH_MS = 280;
    const RECENT_SCAN_COOLDOWN_MS = 1500;
    const RETRY_INTERVAL_MS = 5000;

    let scanner;
    let processingQueue = false;
    let lastSeenAtByQr = {};
    let feedbackStepTimer = null;
    let feedbackClearTimer = null;
    let scanQueue = loadQueue();

    async function onScanSuccess(decodedText) {
      const now = Date.now();
      const lastSeen = lastSeenAtByQr[decodedText] || 0;
      if (now - lastSeen < RECENT_SCAN_COOLDOWN_MS) return;
      lastSeenAtByQr[decodedText] = now;

      if (!isValidQr(decodedText)) {
        flashState("error", "Invalid QR Code format", 1200);
        return;
      }

      enqueueScan(decodedText);
      showCaptureFeedback();
      processQueue();
    }

    function enqueueScan(qrValue) {
      scanQueue.push({
        qr: qrValue,
        rid: buildRequestId(),
        retryCount: 0
      });
      saveQueue();
      updateQueueStatus();
    }

    async function processQueue() {
      if (processingQueue || scanQueue.length === 0) return;
      processingQueue = true;
      updateQueueStatus();

      try {
        while (scanQueue.length > 0) {
          const current = scanQueue[0];
          const result = await sendScan(current);

          if (result.ok || result.duplicate) {
            scanQueue.shift();
            saveQueue();
            continue;
          }

          // Retry forever until success, preserving queue across refresh/close.
          current.retryCount = (current.retryCount || 0) + 1;
          saveQueue();
          if (!HIDE_SYNC_VISUALS) {
            flashState("error", "Error: " + (result.error || "Failed to save scan."), 1200);
          }
          await sleep(RETRY_INTERVAL_MS);
        }
      } finally {
        processingQueue = false;
        updateQueueStatus();
      }
    }

    async function sendScan(item) {
      try {
        const params = new URLSearchParams({
          qr: item.qr,
          key: API_KEY,
          rid: item.rid
        });
        const res = await fetch(GAS_URL + "?" + params.toString(), { redirect: "follow" });

        if (!res.ok) {
          return {
            ok: false,
            retryable: true,
            error: "Server responded with status " + res.status
          };
        }

        const data = await res.json();
        if ((data.ok && data.accepted) || data.duplicate) {
          return { ok: true, duplicate: !!data.duplicate };
        }

        return {
          ok: false,
          retryable: !!data.retryable || data.code === "BUSY" || data.code === "SERVER_ERROR",
          error: data.error,
          duplicate: !!data.duplicate
        };
      } catch (err) {
        return {
          ok: false,
          retryable: true,
          error: "Network error: " + err.message
        };
      }
    }

    function loadQueue() {
      try {
        const raw = localStorage.getItem(QUEUE_STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (_) {
        return [];
      }
    }

    function saveQueue() {
      localStorage.setItem(QUEUE_STORAGE_KEY, JSON.stringify(scanQueue));
    }

    function updateQueueStatus() {
      const statusEl = document.getElementById("processing-status");
      if (HIDE_SYNC_VISUALS) {
        statusEl.style.display = "none";
        return;
      }

      const pending = scanQueue.length;
      if (pending > 0 || processingQueue) {
        statusEl.style.display = "block";
        statusEl.textContent = "Sending... Pending scans: " + pending;
      } else {
        statusEl.style.display = "block";
        statusEl.textContent = "All scans received by server.";
      }
    }

    function flashState(className, message, ms) {
      document.body.classList.remove("detected", "scanned", "error");
      document.body.classList.add(className);
      document.getElementById("result").textContent = message;
      setTimeout(() => document.body.classList.remove(className), ms);
    }

    function showCaptureFeedback() {
      if (feedbackStepTimer) clearTimeout(feedbackStepTimer);
      if (feedbackClearTimer) clearTimeout(feedbackClearTimer);

      document.body.classList.remove("detected", "scanned", "error");
      document.body.classList.add("detected");
      if (!HIDE_SYNC_VISUALS) {
        document.getElementById("result").textContent = "Captured";
      }

      feedbackStepTimer = setTimeout(() => {
        document.body.classList.remove("detected", "error");
        document.body.classList.add("scanned");
        feedbackClearTimer = setTimeout(() => {
          document.body.classList.remove("scanned");
        }, CAPTURE_FLASH_MS);
      }, DETECT_FLASH_MS);
    }

    function isValidQr(value) {
      return !!value && value.length <= MAX_QR_LENGTH && value.startsWith(QR_PREFIX);
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function buildRequestId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return window.crypto.randomUUID();
      }
      return "rid-" + Date.now() + "-" + Math.random().toString(16).slice(2);
    }

    scanner = new Html5QrcodeScanner("reader", {
      fps: 20,
      qrbox: { width: 300, height: 300 },
      aspectRatio: 1.0,
      disableFlip: true,
      rememberLastUsedCamera: true,
      showResultPoints: false,
      showScanSuccessFeedback: false,
    });
    scanner.render(onScanSuccess);
    processQueue();
  </script>
</body>
</html>
